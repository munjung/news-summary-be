spring:
  profiles:
    active: dev
  application:
    name: news-summary

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: newsfeeds
    show-sql: true

news:
  api:
    key: ${NEWS_API_KEY}
    base-url: https://newsapi.org/v2

# UptimeRobot 용
management:
  endpoints:
    web:
      exposure:
        include: health

openai:
  api:
    key: ${OPENAI_API_KEY}
    base-url: https://api.openai.com/v1