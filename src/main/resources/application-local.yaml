spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres?currentSchema=newsfeeds&prepareThreshold=0
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 5
      idle-timeout: 300000
      connection-timeout: 20000